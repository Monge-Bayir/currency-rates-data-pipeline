services:
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      # важно: одинаковый ключ на всех airflow-сервисах (иначе 403 на Logs)
      AIRFLOW__WEBSERVER__SECRET_KEY: "my_shared_secret_key_123"

      # чтобы лог-сервер слушал корректно
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_HOST: "0.0.0.0"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: "8793"
    volumes:
      - ./dags:/opt/airflow/dags
      - ../:/opt/project
    command: >
      bash -lc "airflow db migrate &&
                airflow connections create-default-connections &&
                airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__WEBSERVER__SECRET_KEY: "my_shared_secret_key_123"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_HOST: "0.0.0.0"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: "8793"
      PYTHONPATH: /opt/project
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ../:/opt/project
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      AIRFLOW__WEBSERVER__SECRET_KEY: "my_shared_secret_key_123"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_HOST: "0.0.0.0"
      AIRFLOW__LOGGING__WORKER_LOG_SERVER_PORT: "8793"
      PYTHONPATH: /opt/project
    volumes:
      - ./dags:/opt/airflow/dags
      - ../:/opt/project
    command: scheduler

volumes:
  postgres_data:
